name: March Madness

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: march-madness
  cancel-in-progress: false

jobs:
  update-brackets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch main polls
        run: node scripts/fetch-polls.mjs

      - name: Fetch Patreon polls
        env:
          PATREON_COOKIES: ${{ secrets.PATREON_COOKIES }}
        run: node scripts/fetch-patreon-polls.mjs

      - name: Lint fixes
        run: npm run lint -- --fix

      - name: Commit and push bracket updates
        run: |
          if git diff --quiet -- src/brackets/data/; then
            echo "No bracket data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/brackets/data/
          git commit -m "chore: update march madness brackets"
          git push
